<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Ordering</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/script.js" defer></script>
</head>

<body>
    <h1>Justine's Pizza Shop</h1>
    <p>Welcome! Customize your pizza exactly the way you like it.</p>

    <form id="pizzaForm">

        <fieldset>
            <legend>Customer Information</legend>
            <p>Please enter your contact information before ordering.</p>

            <label>Full Name:</label>
            <input type="text" id="customerName" name="customerName" required>

            <label>Phone Number:</label>
            <input type="tel" id="phone" name="phone" required>

            <label>Email:</label>
            <input type="email" id="email" name="email">

            <p>Order Type:</p>

            <input type="radio" id="pickup" name="orderType" value="Pickup" required>
            <label>Pickup</label>

            <input type="radio" id="delivery" name="orderType" value="Delivery">
            <label>Delivery</label>

            <div id="deliveryInfo">

                <h3>Delivery Address</h3>

                <label>Street Address:</label>
                <input type="text" id="streetAddress" name="streetAddress">

                <label>City:</label>
                <input type="text" id="city" name="city">

                <label>Postal Code:</label>
                <input type="text" id="postalCode" name="postalCode">

            </div>

        </fieldset>

        <fieldset>
            <legend>Pizza Details</legend>

            <label>Pizza Size:</label>
            <select id="size" name="size" required>
                <option value="">Select a size</option>
                <option value="Small">Small</option>
                <option value="Medium">Medium</option>
                <option value="Large">Large</option>
                <option value="Extra Large">Extra Large</option>
            </select>

            <label>Crust Type:</label>
            <select id="crust" name="crust" required>
                <option value="">Select a crust</option>
                <option value="Regular">Regular</option>
                <option value="Thin Crust">Thin Crust</option>
                <option value="Cracker Crust">Cracker Crust</option>
                <option value="Stuffed Crust">Stuffed Crust</option>
                <option value="Gluten Free">Gluten-Free</option>
            </select>

            <label>Sauce:</label>
            <select id="sauce" name="sauce" required>
                <option value="">Select a sauce</option>
                <option value="Pizza Sauce">Pizza Sauce</option>
                <option value="Alfredo">Alfredo</option>
                <option value="BBQ">BBQ</option>
                <option value="Garlic Parm">Garlic Parmesan</option>
                <option value="None">No Sauce</option>
            </select>

            <p>Cheese:</p>
            <input type="radio" id="lightCheese" name="cheese" value="Light" required>
            <label>Light</label>

            <input type="radio" id="regularCheese" name="cheese" value="Regular">
            <label>Regular</label>

            <input type="radio" id="extraCheese" name="cheese" value="Extra">
            <label>Extra</label>

            <input type="radio" id="noCheese" name="cheese" value="None">
            <label>None</label>

            <p>Toppings:</p>

            <h3>Meat Toppings</h3>

            <input type="checkbox" id="pepperoni" name="toppings" value="Pepperoni">
            <label>Pepperoni</label><br>

            <input type="checkbox" id="bacon" name="toppings" value="Bacon">
            <label>Bacon</label><br>

            <input type="checkbox" id="ham" name="toppings" value="Ham">
            <label>Ham</label><br>

            <input type="checkbox" id="sausage" name="toppings" value="Italian Sausage">
            <label>Italian Sausage</label><br>

            <input type="checkbox" id="chicken" name="toppings" value="Grilled Chicken">
            <label>Grilled Chicken</label>

            <h3>Vegetable Toppings</h3>

            <input type="checkbox" id="mushrooms" name="toppings" value="Mushrooms">
            <label>Mushrooms</label><br>

            <input type="checkbox" id="greenPeppers" name="toppings" value="Green Peppers">
            <label>Green Peppers</label><br>

            <input type="checkbox" id="onions" name="toppings" value="Onions">
            <label>Onions</label><br>

            <input type="checkbox" id="blackOlives" name="toppings" value="Black Olives">
            <label>Black Olives</label><br>

            <input type="checkbox" id="pineapple" name="toppings" value="Pineapple">
            <label>Pineapple</label><br>

            <input type="checkbox" id="tomatoes" name="toppings" value="Tomatoes">
            <label>Tomatoes</label><br>

            <input type="checkbox" id="spinach" name="toppings" value="Spinach">
            <label>Spinach</label><br>

            <input type="checkbox" id="jalapenos" name="toppings" value="Jalapeños">
            <label>Jalapeños</label><br>

            <input type="checkbox" id="bananaPeppers" name="toppings" value="Banana Peppers">
            <label>Banana Peppers</label><br>

            <h3>Shake On Seasoning</h3>

            <input type="checkbox" id="parmesan" name="seasoning" value="Parmesan">
            <label>Parmesan Cheese</label><br>

            <input type="checkbox" id="chiliFlakes" name="seasoning" value="Chili Flakes">
            <label>Chili Flakes</label><br>

            <input type="checkbox" id="italianSeasoning" name="seasoning" value="Oregeno">
            <label>Oregeno</label><br>

            <input type="checkbox" id="garlicSeasoning" name="seasoning" value="Garlic">
            <label>Garlic & Herb</label><br>

            <br>
            <label>Quantity:</label>
            <input type="number" id="quantity" name="quantity" min="1" value="1" required>

            <br>
            <label>Special Instructions:</label>
            <textarea id="instructions" name="instructions" rows="4"
                placeholder="Enter any special requests here (ex. well done, sqaure cut)"></textarea>

        </fieldset>

        <button type="submit">Place Order</button>

    </form>

</body>

</html>
