<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Ordering</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/script.js" defer></script>
</head>

<body>
    <h1>Justine's Pizza Shop</h1>
    <p>Welcome! Customize your pizza exactly the way you like it.</p>

    <form id="pizzaForm">

        <fieldset>
            <legend>Customer Information</legend>
            <p>Please enter your contact information before ordering.</p>

            <label>Full Name:</label>
            <input type="text" id="customerName" name="customerName" required>

            <label>Phone Number:</label>
            <input type="tel" id="phone" name="phone" required>

            <label>Email:</label>
            <input type="email" id="email" name="email">

            <p>Order Type:</p>
            
            <input type="radio" id="pickup" name="orderType" value="Pickup" required>
            <label>Pickup</label>

            <input type="radio" id="delivery" name="orderType" value="Delivery">
            <label>Delivery</label>

            <div id="deliveryInfo">

                <h3>Delivery Address</h3>

                <label>Street Address:</label>
                <input type="text" id="streetAddress" name="streetAddress">

                <label>City:</label>
                <input type="text" id="city" name="city">

                <label>Postal Code:</label>
                <input type="text" id="postalCode" name="postalCode">

            </div>

        </fieldset>

        <fieldset>
             <legend>Pizza Details</legend>

        </fieldset>

    </form>

</body>

</html>
