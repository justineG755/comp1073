<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control Application</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- page heading -->
    <h1>Mission Control Terminal</h1>

    <!-- section heading -->
    <h2>Mission Selections</h2>

    <!-- agent type selection -->
    <p>Agent Type: <span id="agentDisplay">None Selected</span></p>
    <button id="agentBtn">Change Agent</button>

    <!-- mission location selection -->
    <p>Mission Location: <span id="locationDisplay">None Selected</span></p>
    <button id="locationBtn">Change Location</button>

    <!-- weapon loadout selection -->
    <p>Weapon Loadout: <span id="weaponDisplay">None Selected</span></p>
    <button id="weaponBtn">Change Weapon</button>

    <!-- mission objective selection -->
    <p>Mission Objective: <span id="objectiveDisplay">None Selected</span></p>
    <button id="objectiveBtn">Change Objective</button>

    <!-- risk level selection -->
    <p>Risk Level: <span id="riskDisplay">None Selected</span></p>
    <button id="riskBtn">Change Risk</button>

    <br>
    <br>

    <!-- mission briefing button -->
    <button id="launchBtn">LAUNCH MISSION</button>
    <button id="resetBtn">RESET MISSION</button>

    <!-- mission briefing heading -->
    <h2>Mission Briefing</h2>

    <!-- final mission briefing message -->
    <div id="missionOutput">
        Mission details will appear here...
    </div>

    <!-- link script -->
    <script src="script.js"></script>
</body>

</html>
